name: connector3d
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - setuptools>=65.0        # required by setup.py / pip install -e .
  - numpy>=1.24
  - pip
  - pip:
      # install the project itself in editable mode so imports work everywhere
      - -e .
      # dev/test extras (optional — comment out if not needed)
      - pytest>=7.0
      - black
      - flake8
      # ── optional, heavy — uncomment only if you need them ──
      # hyperparameter optimization (hpo_ray.py):
      # - ray[tune]>=2.9
      # STEP -> STL conversion backend (dataset_convert.py); STL -> OBJ works without it:
      # - gmsh>=4.11

# ── Quick reference ──────────────────────────────────────────────────────────
#
# Create env (first time):
#   conda env create -f environment.yml
#   conda activate connector3d
#
# Update existing env after editing this file:
#   conda env update -f environment.yml --prune
#
# Export your current env back to a file (to snapshot exact versions):
#   conda env export > environment.lock.yml
#
# Remove env entirely:
#   conda env remove -n connector3d
#
# ── Note on Blender ───────────────────────────────────────────────────────────
# Blender ships its own Python interpreter and cannot use this conda env.
# blender_export.py inserts the project root into sys.path at runtime so
# bpy can find the connector3d modules without a separate install.
#
# ── Note on Anaconda vs Miniconda ────────────────────────────────────────────
# This file works with both Anaconda and Miniconda.
# If you use the Anaconda Navigator, you can import this file directly via:
#   Environments → Import → select environment.yml